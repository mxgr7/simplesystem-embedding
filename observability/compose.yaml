services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: observability-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - milvus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: observability-grafana
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  caddy:
    image: caddy:2.8
    container_name: observability-caddy
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:?set BASIC_AUTH_USER in observability/.env}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:?set BASIC_AUTH_HASH in observability/.env}
    depends_on:
      - grafana
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:

networks:
  milvus:
    external: true
    name: milvus
