services:
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    command: ["--model-id", "/model", "--port", "80", "--pooling", "mean"]
    ports:
      - "8080:80"
    volumes:
      - ${TEI_MODEL_DIR:-/data/tei-models/useful-cub-58-st}:/model:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # F9 bulk indexer's TEI embedding cache (`indexer.tei_cache`,
    # key prefix `tei:v{HASH_VERSION}:`). RDB snapshot every 5 min if
    # ≥1000 keys changed; AOF off — the cache is fully reproducible
    # from the article corpus, so per-write durability buys nothing.
    command: ["redis-server", "--save", "300", "1000", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      # Bind to /data on the host (1 TB nvme) — the prewarm load of
      # ~52 GB will not fit on the docker root volume.
      - /data/redis-data:/data
    restart: unless-stopped

  playground-app:
    build:
      context: ..
      dockerfile: playground-app/Dockerfile
    env_file:
      - .env
    network_mode: host
    volumes:
      - ${OFFERS_PARQUET_DIR}:${OFFERS_PARQUET_DIR}:ro
      - ${QUERIES_PARQUET_DIR}:${QUERIES_PARQUET_DIR}:ro
      - ../logs:/app/logs
    depends_on:
      - tei
      - redis
    restart: unless-stopped

  search-api:
    build:
      context: ..
      dockerfile: search-api/Dockerfile
    env_file:
      - .env
    environment:
      ID_FIELDS: offers=id,offers_playground=playground_id,offers_playground_trimmed=playground_id
      API_KEY: ${SEARCH_API_KEY}
    network_mode: host
    depends_on:
      - tei
      - redis
    restart: unless-stopped

  acl:
    # F9-followon ACL service (packet A1 skeleton). Exposes the
    # narrowed legacy `/article-features/search` contract on port 8081
    # and translates each request into one or more search-api calls.
    # A2/A3/A4 fill in the actual mapping; right now this serves a
    # 501 stub + the OpenAPI doc.
    build:
      context: ..
      dockerfile: acl/Dockerfile
    environment:
      FTSEARCH_URL: http://localhost:8001
    network_mode: host
    depends_on:
      - search-api
    restart: unless-stopped
