<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fine-tuned Embedding Search — Playground</title>
  <link rel="stylesheet" href="/static/app.css?v={{ css_version }}">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <div class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Fine-tuned Embedding Search <span class="site-title-sep">—</span> Playground</h1>
      <p class="site-subtitle">e5 fine-tune · Milvus + HNSW · simplesystem offer catalog</p>
    </div>
  </div>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-row">
        <div class="search-cluster">
          <form class="search-box"
                hx-get="/search"
                hx-target="#results"
                hx-swap="innerHTML"
                hx-push-url="true"
                hx-indicator="#search-indicator"
                hx-include="[name='k'],[name='num_candidates']">
            <svg class="search-icon" viewBox="0 0 20 20" width="18" height="18" aria-hidden="true"><circle cx="9.5" cy="9.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="m14 14 5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="text" name="q" placeholder="Search here" value="{{ query }}" autocomplete="off" autofocus>
            <button type="button" class="clear-btn" aria-label="Clear" onclick="this.form.q.value='';this.form.q.focus();">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="m3 3 10 10M13 3 3 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
            </button>
          </form>
        </div>
        <div class="topbar-indicator" id="search-indicator" aria-live="polite">
          <span class="spinner" aria-hidden="true"></span>
          <span>Searching…</span>
        </div>
      </div>
      <div class="search-params" id="search-params">
        <label class="param">
          <span class="param-label">k</span>
          <input type="number" name="k" min="1" max="10000" step="1" placeholder="100" inputmode="numeric">
        </label>
        <label class="param">
          <span class="param-label">num_candidates</span>
          <input type="number" name="num_candidates" min="0" max="100000" step="1" placeholder="auto" inputmode="numeric">
        </label>
        <span class="param-hint">stored in your browser · change re-runs the search</span>
      </div>
    </div>
    <div class="progress-bar" id="progress-bar" aria-hidden="true"><span></span></div>
  </header>

  <main class="page">
    <div id="results">{{ initial_html|safe }}</div>
  </main>

  <script>
    (function () {
      var KEYS = { k: "playground.k", num_candidates: "playground.num_candidates" };
      var form = document.querySelector("form.search-box");
      var inputs = {
        k: document.querySelector('input[name="k"]'),
        num_candidates: document.querySelector('input[name="num_candidates"]'),
      };
      Object.keys(inputs).forEach(function (name) {
        var saved = localStorage.getItem(KEYS[name]);
        if (saved !== null) inputs[name].value = saved;
        inputs[name].addEventListener("change", function () {
          var v = inputs[name].value.trim();
          if (v === "") localStorage.removeItem(KEYS[name]);
          else localStorage.setItem(KEYS[name], v);
          var q = form.querySelector('input[name="q"]').value.trim();
          if (q && window.htmx) window.htmx.trigger(form, "submit");
        });
      });

      document.body.addEventListener("htmx:beforeRequest", function (e) {
        var elt = e.target;
        if (elt && elt.matches && elt.matches("form.search-box")) {
          document.body.classList.add("is-searching");
        }
      });
      ["htmx:afterRequest", "htmx:responseError", "htmx:sendError", "htmx:timeout"]
        .forEach(function (evt) {
          document.body.addEventListener(evt, function () {
            document.body.classList.remove("is-searching");
          });
        });

      function showHtmxError(title, detail) {
        var html =
          '<section class="results-page"><div class="main-col">' +
          '<div class="search-error" role="alert">' +
          '<svg class="search-error-icon" viewBox="0 0 20 20" width="18" height="18" aria-hidden="true">' +
          '<circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="1.6"/>' +
          '<path d="M10 6v5M10 13.5v.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>' +
          '</svg><div class="search-error-body">' +
          '<div class="search-error-title"></div>' +
          '<div class="search-error-detail"></div>' +
          '</div></div></div></section>';
        var results = document.getElementById("results");
        if (!results) return;
        results.innerHTML = html;
        results.querySelector(".search-error-title").textContent = title;
        results.querySelector(".search-error-detail").textContent = detail;
      }
      document.body.addEventListener("htmx:responseError", function (e) {
        var xhr = e.detail.xhr;
        showHtmxError(
          "Request failed (HTTP " + xhr.status + ")",
          (xhr.responseText || "").slice(0, 500) || xhr.statusText || ""
        );
      });
      document.body.addEventListener("htmx:sendError", function () {
        showHtmxError(
          "Network error",
          "Could not reach the playground server. Check your connection and try again."
        );
      });
      document.body.addEventListener("htmx:timeout", function () {
        showHtmxError("Request timed out", "The server took too long to respond.");
      });

      document.addEventListener("click", function (e) {
        var btn = e.target.closest && e.target.closest(".catalog-versions-toggle");
        if (!btn) return;
        var container = btn.closest(".card-catalog-versions");
        if (!container) return;
        var expanded = container.classList.toggle("is-expanded");
        btn.setAttribute("aria-expanded", expanded ? "true" : "false");
        btn.textContent = expanded
          ? (btn.dataset.lessLabel || "Show less")
          : (btn.dataset.moreLabel || "Show more");
      });
    })();
  </script>
</body>
</html>
