defaults:
  - model: distill_cross_encoder
  - data: cross_encoder
  - trainer: cross_encoder
  - optimizer: adamw
  - logger: mlflow
  - _self_

seed: 42
log_level: WARNING

trainer:
  max_epochs: 2
  max_time: "00:01:00:00"  # 1 h budget per program; bump for longer runs.
  precision: bf16-mixed

logger:
  experiment_name: cross-encoder-inference

hydra:
  job:
    chdir: false
  run:
    dir: outputs/distill/${now:%Y-%m-%d}/${now:%H-%M-%S}
