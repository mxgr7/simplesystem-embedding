path: ../../data/queries_offers_labeled.parquet
positive_label: Exact
query_id_column: query_id
offer_id_column: offer_id_b64
batch_size: 512
train_batching_mode: random_query_pool
n_pos_samples_per_query: 2
n_neg_samples_per_query: 4
log_batch_stats: true
num_workers: 16
pin_memory: true
max_query_length: 32
max_offer_length: 256
val_fraction: 0.05
val_split_mode: query_id
clean_html: true
limit_rows: null
hard_negatives_path: null
# hard_negatives_path: ../../data/hard_negatives-adorable-mole-653.parquet
# semi_hard_negatives_path: null
# semi_hard_negatives_path: ../../data/semi_hard_negatives-adorable-mole-653.parquet
semi_hard_negatives_path: ../../data/semi_hard_negatives-defiant-mink-296.parquet
cache_prepared_dataset: true
prepare_cache_dir: .cache/prepared_dataset

query_template: |-
  query: {{ query_term }}

offer_template: |-
  passage: Article Name: {{ name }}
  {% if ean %} EAN: {{ ean }}{% endif %}
  {% if article_number %} Article Number: {{ article_number }}{% endif %}
  {% if manufacturer_article_number %} Article Number (Manufacturer): {{ manufacturer_article_number }}{% endif %}
  {% if category_text %} Category: {{ category_text }}{% endif %}
  {% if manufacturer_article_type %} Article Type: {{ manufacturer_article_type }}{% endif %}
  {% if manufacturer_name %} Brand: {{ manufacturer_name }}{% endif %}
  {% if clean_description %} Description: {{ clean_description }}{% endif %}
