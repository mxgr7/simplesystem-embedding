path: ../data/queries_offers_esci/queries_offers_merged_labeled.parquet
positive_label: Exact
split_column: split
column_mapping:
  query_id: query_id
  offer_id: offer_id
  query_term: query_term
  name: name
  manufacturer_name: manufacturer_name
  manufacturer_article_number: manufacturer_article_number
  manufacturer_article_type: manufacturer_article_type
  article_number: article_number
  ean: ean
  category_paths: category_paths
  description: description
  label: label
batch_size: 32
num_workers: 8
pin_memory: true
max_pair_length: 512
val_fraction: 0.05
clean_html: true
limit_rows: null
column_rename: null

# Three feature slots emitted as special tokens prepended to the query text.
# article uses 5 states (NONE / EXACT / SUBSTRING_ONLY / MISMATCH / OFFER_INVALID);
# ean and spec use 3 states (NONE / MATCH / MISMATCH).
features:
  enabled: false
  slot_order: [ean, article, spec]
  normalize:
    leading_zeros: keep
    multivalue_separators: ",;|"
  ean:
    enabled: true
    offer_field: ean
    validate: gtin
    on_offer_invalid: none
  article:
    enabled: true
    offer_fields: [article_number, manufacturer_article_number]
    min_token_len: 4
  spec:
    enabled: false
    offer_fields: [name, description]
    rules:
      - thread_m
      - g_thread
      - dimensions
      - fraction
      - decimal_de
      - mm
      - cm
      - micrometre
      - cross_sect
      - inch_zoll
      - voltage
      - ampere
      - ah
      - watt
      - hz
      - volume_l
      - mass_kg
      - pressure
      - din
      - iso
      - en_norm
      - strength_cls
      - stainless
      - ral_color
      - ip_rating
      - cat_rating
      - dn_nw_pn
      - pg_gland
      - awg
      - lumen_lux
    on_offer_invalid: none

query_template: |-
  {{ query_term }}

offer_template: |-
  Artikel: {{ name }}
  {% if ean %} EAN: {{ ean }}{% endif %}
  {% if article_number %} Artikelnummer: {{ article_number }}{% endif %}
  {% if manufacturer_article_number %} Herstellernummer: {{ manufacturer_article_number }}{% endif %}
  {% if category_text %} Kategorie: {{ category_text }}{% endif %}
  {% if manufacturer_article_type %} Artikeltyp: {{ manufacturer_article_type }}{% endif %}
  {% if manufacturer_name %} Marke: {{ manufacturer_name }}{% endif %}
  {% if clean_description %} Beschreibung: {{ clean_description }}{% endif %}
