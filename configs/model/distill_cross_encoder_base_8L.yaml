# 8L pruned gelectra-base student + 4-class head. Same backbone as
# distill_cross_encoder_binary_8L but keeps the 4-class output (richer
# training signal). For 20-min budgets the binary head converges faster;
# at 1h+ the 4-class head may catch up or overtake. Use for finalize runs
# after a binary 20-min has shown promise on this backbone.
model_name: deepset/gelectra-base
student_name: deepset/gelectra-base
teacher_name: deepset/gelectra-large
teacher_ckpt: ${oc.env:TEACHER_CKPT,../checkpoints/cross-encoder/releases/v1.0-2026-04-29/soup.ckpt}
prune_layers: 8
binary_head: false
head_dropout: 0.1
label_smoothing: 0.0
focal_gamma: 0.0
use_class_weights: false
gradient_checkpointing: false
compile: false

distill_temperature: 2.0
distill_alpha: 0.7
