# 6L pruned gelectra-base student + binary Exact head. Most aggressive
# backbone cut (50% of 12L kept); projected p95 ~1554 ms (~50% of the 12L
# 3107 ms baseline) — comfortable below the 2500 ms target. Quality risk
# higher than 8L; 6L pruned-large from 24L (25% kept) failed at f1_exact 0.78
# but 6L from 12L (50% kept) is less aggressive cut-fraction and may hold.
model_name: deepset/gelectra-base
student_name: deepset/gelectra-base
teacher_name: deepset/gelectra-large
teacher_ckpt: ${oc.env:TEACHER_CKPT,../checkpoints/cross-encoder/releases/v1.0-2026-04-29/soup.ckpt}
prune_layers: 6
binary_head: true
head_dropout: 0.1
label_smoothing: 0.0
focal_gamma: 0.0
use_class_weights: false
gradient_checkpointing: false
compile: false

distill_temperature: 2.0
distill_alpha: 0.7
