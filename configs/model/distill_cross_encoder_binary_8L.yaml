# 8L pruned gelectra-base student + binary Exact head. Cuts forward FLOPs
# by ~33% vs the 12L base (12L distill landed at p95 3107 ms; 8L target
# ~2080 ms, well under the 2500 ms budget). Binary head removes the 3
# wasted output channels and the Complement-class loss-surface trap that
# capped 4-class distill macro_f1; combined with a smaller backbone the
# capacity-vs-target alignment is much cleaner.
model_name: deepset/gelectra-base
student_name: deepset/gelectra-base
teacher_name: deepset/gelectra-large
teacher_ckpt: ${oc.env:TEACHER_CKPT,../checkpoints/cross-encoder/releases/v1.0-2026-04-29/soup.ckpt}
prune_layers: 8  # keep first 8 of 12 transformer blocks
binary_head: true
head_dropout: 0.1
label_smoothing: 0.0
focal_gamma: 0.0
use_class_weights: false
gradient_checkpointing: false
compile: false

distill_temperature: 2.0
distill_alpha: 0.7
